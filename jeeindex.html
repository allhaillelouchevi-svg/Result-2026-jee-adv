<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JEE Advanced 2026 Result</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 60px;
}
h2 {
    color: #003366;
}
input, button {
    width: 85%;
    max-width: 350px;
    padding: 12px;
    margin: 10px;
    font-size: 16px;
}
button {
    cursor: pointer;
}
img {
    display: none;
    margin-top: 20px;
    width: 220px;
}
#msg {
    font-weight: bold;
    margin-top: 15px;
}
</style>
</head>
<body>
<h2>JEE Advanced 2026 Result Portal</h2>
<input type="text" id="roll" placeholder="Application Number">
<input type="text" id="dob" placeholder="Date of Birth (DD/MM/YYYY)">
<button onclick="checkResult()">View Result</button>
<p id="msg"></p>
<img id="photo" src="photo.jpg" alt="Result Photo">
<script>
function checkResult() {
    var roll = document.getElementById("roll").value.trim();
    var dob = document.getElementById("dob").value.trim();
    if (roll === "207245678" && dob === "30/11/2007") {
        document.getElementById("photo").style.display = "block";
        document.getElementById("msg").innerText =
            "Result Loaded Successfully";
    } else {
        document.getElementById("photo").style.display = "none";
        document.getElementById("msg").innerText =
            "Invalid Application Number or Date of Birth";
    }
}
</script>
</body>
</html>
