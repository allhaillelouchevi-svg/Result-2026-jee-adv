<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JEE Advanced 2026 Result Demo</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 60px;
}
input, button {
  width: 85%;
  max-width: 350px;
  padding: 12px;
  margin: 10px;
  font-size: 16px;
}
img {
  display: none;
  margin-top: 20px;
  width: 220px;
}
h2 {
  color: #003366;
}
#msg {
  font-weight: bold;
  margin-top: 15px;
}
</style>
</head>
<body>
<h2>JEE Advanced 2026 Result Portal (Demo)</h2>
<input id="roll" placeholder="Application Number">
<input id="dob" placeholder="Date of Birth (DD/MM/YYYY)">
<button onclick="checkResult()">View Result</button>
<p id="msg"></p>
<img id="photo" src="photo.jpg" alt="Result Photo">
<script>
function checkResult() {
  if (
    document.getElementById("roll").value === "207245678" &&
    document.getElementById("dob").value === "30/10/2005"
  ) {
    document.getElementById("photo").style.display = "block";
    document.getElementById("msg").innerText =
      "Result Loaded Successfully (Demo)";
  } else {
    document.getElementById("photo").style.display = "none";
    document.getElementById("msg").innerText =
      "Invalid Application Number or Date of Birth";
  }
}
</script>
</body>
</html>
